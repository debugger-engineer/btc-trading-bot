name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Deploy to server
        run: |
          # Disable Docker credential store to avoid keychain issues
          mkdir -p $HOME/.docker
          echo '{"credsStore": ""}' > $HOME/.docker/config.json
          export DOCKER_CONFIG="$HOME/.docker"

          # Auto-discover Docker socket
          if [ -S "/var/run/docker.sock" ]; then
            export DOCKER_HOST="unix:///var/run/docker.sock"
            export DOCKER_SOCK="/var/run/docker.sock"
          elif [ -S "$HOME/.docker/run/docker.sock" ]; then
            export DOCKER_HOST="unix://$HOME/.docker/run/docker.sock"
            export DOCKER_SOCK="$HOME/.docker/run/docker.sock"
          fi
          echo "Using DOCKER_HOST=$DOCKER_HOST"
          echo "Using DOCKER_SOCK=$DOCKER_SOCK"

          # Detect docker compose command
          if docker compose version > /dev/null 2>&1; then
            DOCKER_COMPOSE="docker compose"
          else
            DOCKER_COMPOSE="docker-compose"
          fi
          echo "Using $DOCKER_COMPOSE"

          TARGET_DIR="/Users/admin/opt/apps-prod/btc-trading-bot"
          mkdir -p "$TARGET_DIR"

          # Sync code (preserves .env and other untracked files on server)
          rsync -avz --exclude '.git' --exclude '.env' ./ "$TARGET_DIR/"

          cd "$TARGET_DIR"

          # Build --profile flags from active accounts in config/accounts.json
          PROFILE_FLAGS=$(python3 -c "import json; cfg=json.load(open('config/accounts.json')); print(' '.join('--profile '+a['name'] for a in cfg['accounts'] if a.get('active')))")
          echo "Active profiles: $PROFILE_FLAGS"

          $DOCKER_COMPOSE $PROFILE_FLAGS up -d --build --remove-orphans

          echo "Running containers:"
          $DOCKER_COMPOSE ps
