name: CI/CD

on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pandas requests python-dotenv psycopg2-binary pytest pytest-mock

      - name: Run tests
        run: pytest

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Deploy to server
        run: |
          # Detect docker compose command
          if docker compose version > /dev/null 2>&1; then
            DOCKER_COMPOSE="docker compose"
          else
            DOCKER_COMPOSE="docker-compose"
          fi
          echo "Using $DOCKER_COMPOSE"

          TARGET_DIR="${{ vars.DEPLOY_TARGET_DIR }}"
          mkdir -p "$TARGET_DIR"

          # Sync code (preserves .env and other untracked files on server)
          rsync -avz --exclude '.git' --exclude '.env' ./ "$TARGET_DIR/"

          cd "$TARGET_DIR"

          # Build --profile flags from active accounts in config/accounts.json
          PROFILE_FLAGS=$(python3 -c "import json; cfg=json.load(open('config/accounts.json')); print(' '.join('--profile '+a['name'] for a in cfg['accounts'] if a.get('active')))")
          echo "Active profiles: $PROFILE_FLAGS"

          $DOCKER_COMPOSE $PROFILE_FLAGS up -d --build --remove-orphans

          echo "Running containers:"
          $DOCKER_COMPOSE ps
