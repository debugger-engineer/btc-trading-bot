      - BOT_SYMBOL=BTC
      - HL_PRIVATE_KEY=${HL_PRIVATE_KEY_8X}
      - HL_WALLET_ADDRESS=${HL_WALLET_ADDRESS_8X}
    volumes:
      - ./config:/app/config:ro

  bot-10x-btc:
    build: .
    container_name: trading-bot-10x-btc
    restart: on-failure
    env_file: .env
