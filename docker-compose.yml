services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: btc-rsi-trading-bot-tailscale
    hostname: btc-rsi-trading-bot
    restart: unless-stopped
    ports:
      - "5432:5432"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    healthcheck:
      test: ["CMD-SHELL", "tailscale status --peers=false | grep -q 'logged out' && exit 1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  postgres:
    image: postgres:15-alpine
    container_name: btc-rsi-trading-bot-postgres
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-crypto_trading}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-crypto-trading}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot-5x:
    build: .
    container_name: btc-rsi-bot-5x
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - BOT_ACCOUNT=bot-5x
      - HL_PRIVATE_KEY=${HL_PRIVATE_KEY_5X}
      - HL_WALLET_ADDRESS=${HL_WALLET_ADDRESS_5X}
    volumes:
      - ./logs/bot-5x:/app/logs
      - ./config:/app/config:ro

  bot-8x:
    build: .
    container_name: btc-rsi-bot-8x
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - BOT_ACCOUNT=bot-8x
      - HL_PRIVATE_KEY=${HL_PRIVATE_KEY_8X}
      - HL_WALLET_ADDRESS=${HL_WALLET_ADDRESS_8X}
    volumes:
      - ./logs/bot-8x:/app/logs
      - ./config:/app/config:ro

  bot-10x:
    build: .
    container_name: btc-rsi-bot-10x
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - BOT_ACCOUNT=bot-10x
      - HL_PRIVATE_KEY=${HL_PRIVATE_KEY_10X}
      - HL_WALLET_ADDRESS=${HL_WALLET_ADDRESS_10X}
    volumes:
      - ./logs/bot-10x:/app/logs
      - ./config:/app/config:ro

volumes:
  postgres_data:
